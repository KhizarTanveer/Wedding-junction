<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb7185"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#fef3c7"/>

  <!-- Left ring -->
  <circle cx="24" cy="32" r="14" fill="none" stroke="url(#gold)" stroke-width="4"/>

  <!-- Right ring (interlocked) -->
  <circle cx="40" cy="32" r="14" fill="none" stroke="url(#gold)" stroke-width="4"/>

  <!-- Small heart on top -->
  <path d="M32 18 C32 18 28 14 25 14 C21 14 18 17 18 21 C18 28 32 36 32 36 C32 36 46 28 46 21 C46 17 43 14 39 14 C36 14 32 18 32 18"
        fill="url(#rose)"
        transform="scale(0.35) translate(55, 10)"/>

  <!-- Diamond sparkle -->
  <path d="M32 8 L33.5 11 L32 14 L30.5 11 Z" fill="#fbbf24"/>
</svg>
